name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-exporter
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-exporter

      - name: Check
        run: cargo check --all-targets

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          GRAFANA_ADMIN_USER=admin
          GRAFANA_ADMIN_PASSWORD=admin
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=test
          DB_USER=test
          DB_PASSWORD=test
          EOF

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for rust-exporter to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "rust-exporter is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "rust-exporter failed to start"
              docker compose logs rust-exporter
              exit 1
            fi
            sleep 2
          done

          echo "Waiting for Prometheus..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/-/healthy > /dev/null 2>&1; then
              echo "Prometheus is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Prometheus failed to start"
              docker compose logs prometheus
              exit 1
            fi
            sleep 2
          done

          echo "Waiting for Grafana..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Grafana is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Grafana failed to start"
              docker compose logs grafana
              exit 1
            fi
            sleep 2
          done

      - name: Verify metrics endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/metrics)
          if [ "$response" != "200" ]; then
            echo "Metrics endpoint returned $response"
            exit 1
          fi
          echo "Metrics endpoint OK (HTTP 200)"

          content_type=$(curl -sI http://localhost:8001/metrics | grep -i content-type)
          if ! echo "$content_type" | grep -q "text/plain"; then
            echo "Unexpected content type: $content_type"
            exit 1
          fi
          echo "Content-Type OK (text/plain)"

      - name: Verify Prometheus targets
        run: |
          sleep 5
          targets=$(curl -s http://localhost:9090/api/v1/targets)
          echo "$targets" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          rust_target = [t for t in data['data']['activeTargets'] if t['labels'].get('job') == 'rust-exporter']
          if not rust_target:
              print('ERROR: rust-exporter target not found in Prometheus')
              sys.exit(1)
          print(f\"rust-exporter target found, health: {rust_target[0]['health']}\")
          "

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v

  e2e-screenshots:
    name: E2E Dashboard Screenshots
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          GRAFANA_ADMIN_USER=admin
          GRAFANA_ADMIN_PASSWORD=admin
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=test
          DB_USER=test
          DB_PASSWORD=test
          EOF

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for all services
        run: |
          for svc_url in "http://localhost:8001/health" "http://localhost:9090/-/healthy" "http://localhost:3000/api/health"; do
            echo "Waiting for $svc_url..."
            for i in $(seq 1 60); do
              if curl -sf "$svc_url" > /dev/null 2>&1; then
                echo "  Ready"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "  TIMEOUT"
                docker compose logs
                exit 1
              fi
              sleep 2
            done
          done
          echo "Waiting for first metrics scrape..."
          sleep 65

      - name: Run E2E screenshot tests
        run: npx playwright test
        env:
          GRAFANA_URL: http://localhost:3000

      - name: Upload dashboard screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-screenshots
          path: test-results/screenshots/
          retention-days: 30

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
