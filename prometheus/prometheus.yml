global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'channel-health-monitoring'
    environment: 'production'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  - job_name: 'rust-exporter'
    scrape_interval: 60s
    static_configs:
      - targets: ['rust-exporter:8001']
        labels:
          service: 'rust-exporter'
          app: 'claude_code'
