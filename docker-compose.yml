services:
  rust-exporter:
    build:
      context: ./rust-exporter
      dockerfile: Dockerfile
    container_name: rust-exporter
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      - PUSHGATEWAY_URL=${PUSHGATEWAY_URL:-}
      - PUSHGATEWAY_JOB=${PUSHGATEWAY_JOB:-channel-health-exporter}
      - PUSHGATEWAY_USERNAME=${PUSHGATEWAY_USERNAME:-}
      - PUSHGATEWAY_PASSWORD=${PUSHGATEWAY_PASSWORD:-}
      - PUSHGATEWAY_INTERVAL=${PUSHGATEWAY_INTERVAL:-60}
    ports:
      - "8001:8001"
    restart: unless-stopped
