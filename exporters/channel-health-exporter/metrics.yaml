# Metrics Configuration
# This file is the single source of truth for all metrics definitions
# Both Python exporter and Grafana dashboard read from this file

metrics:
  - name: channel_availability_percent
    type: Gauge
    description: 渠道可用性百分比（排除用户错误）
    labels:
      - channel_group
    collection_frequency: 60s
    calculation_formula: 成功请求数 / (总请求数 - 用户错误请求数) × 100
    notes: 排除的错误类型：400/404/413/429（用户错误）、401/403（鉴权问题）、500 credit balance（余额不足）
    sql_query: |
      SELECT
          CASE WHEN channel_code='aws' THEN 'aws' ELSE 'special' END as grp,
          ROUND(
              SUM(CASE WHEN status='success' THEN 1 ELSE 0 END)::numeric * 100.0
              / NULLIF(SUM(CASE WHEN
                  NOT (
                      response_code IN (400,404,413,429)
                      OR (response_code = -1 AND error_message LIKE '%unconfigured%')
                      OR response_code IN (401,403)
                      OR (response_code = 500 AND error_message LIKE '%credit balance%')
                  )
                  OR status='success' THEN 1 ELSE 0 END), 0)
          , 1) as availability
      FROM channel_request_log
      WHERE created_at >= NOW() - INTERVAL '3 hours'
          AND channel_code IN ('claude_laohu_max','claude_steven','claude_steven_az','claude_laohu_official','aws')
      GROUP BY grp

  - name: channel_cache_reuse_percent
    type: Gauge
    description: 缓存复用率百分比
    labels:
      - channel_group
    collection_frequency: 60s
    calculation_formula: 缓存读取 tokens / (缓存读取 tokens + 缓存创建 tokens) × 100
    notes: 越高越好，表示更多地复用了缓存的 prompt，降低成本
    sql_query: |
      SELECT
          CASE WHEN channel_used='aws' THEN 'aws' ELSE 'special' END as grp,
          ROUND(
              SUM(cache_read_tokens)::numeric * 100.0
              / NULLIF(SUM(cache_read_tokens) + SUM(cache_creation_tokens), 0)
          , 1) as cache_reuse
      FROM balance_transactions
      WHERE created_at >= NOW() - INTERVAL '3 hours'
          AND type='consume' AND transaction_status='completed'
          AND channel_used IN ('claude_laohu_max','claude_steven','claude_steven_az','claude_laohu_official','aws')
      GROUP BY grp

  - name: channel_avg_cost_cny_opus
    type: Gauge
    description: Opus 模型平均成本（人民币/次）
    labels:
      - channel_group
    collection_frequency: 60s
    calculation_formula: AVG(final_price_cny) WHERE model_name LIKE '%opus%'
    notes: 仅统计 Opus 模型的请求成本
    sql_query: |
      SELECT
          CASE WHEN channel_used='aws' THEN 'aws' ELSE 'special' END as grp,
          ROUND(AVG(CASE WHEN model_name LIKE '%opus%' THEN final_price_cny END)::numeric, 2) as opus_price
      FROM balance_transactions
      WHERE created_at >= NOW() - INTERVAL '3 hours'
          AND type='consume' AND transaction_status='completed'
          AND channel_used IN ('claude_laohu_max','claude_steven','claude_steven_az','claude_laohu_official','aws')
      GROUP BY grp

  - name: channel_avg_cost_cny_sonnet
    type: Gauge
    description: Sonnet 模型平均成本（人民币/次）
    labels:
      - channel_group
    collection_frequency: 60s
    calculation_formula: AVG(final_price_cny) WHERE model_name LIKE '%sonnet%'
    notes: 仅统计 Sonnet 模型的请求成本
    sql_query: |
      SELECT
          CASE WHEN channel_used='aws' THEN 'aws' ELSE 'special' END as grp,
          ROUND(AVG(CASE WHEN model_name LIKE '%sonnet%' THEN final_price_cny END)::numeric, 2) as sonnet_price
      FROM balance_transactions
      WHERE created_at >= NOW() - INTERVAL '3 hours'
          AND type='consume' AND transaction_status='completed'
          AND channel_used IN ('claude_laohu_max','claude_steven','claude_steven_az','claude_laohu_official','aws')
      GROUP BY grp

  - name: channel_avg_cost_cny_all
    type: Gauge
    description: 所有模型平均成本（人民币/次）
    labels:
      - channel_group
    collection_frequency: 60s
    calculation_formula: AVG(final_price_cny)
    notes: 包含所有模型（Opus、Sonnet 等）的平均成本
    sql_query: |
      SELECT
          CASE WHEN channel_used='aws' THEN 'aws' ELSE 'special' END as grp,
          ROUND(AVG(final_price_cny)::numeric, 2) as avg_price
      FROM balance_transactions
      WHERE created_at >= NOW() - INTERVAL '3 hours'
          AND type='consume' AND transaction_status='completed'
          AND channel_used IN ('claude_laohu_max','claude_steven','claude_steven_az','claude_laohu_official','aws')
      GROUP BY grp
